<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memkin</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: #0f1115;
        color: #e6e8ec;
      }
      .brand { font-size: 1.5rem; font-weight: 600; letter-spacing: 0.02em; }
      .status { font-size: 0.9rem; opacity: 0.7; }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(230, 232, 236, 0.25);
        border-top-color: #e6e8ec;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <div class="brand">Memkin</div>
    <div class="status">Starting Memkin…</div>
  </body>
</html>
