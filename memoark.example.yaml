# Memoark Configuration — EXAMPLE TEMPLATE
#
# Copy this file to `memoark.yaml` and fill in your own values:
#   cp memoark.example.yaml memoark.yaml
#
# `memoark.yaml` is git-ignored on purpose (it may contain secrets and
# machine-specific paths). Never commit your real config. Prefer environment
# variables (e.g. ${OPENAI_API_KEY}) over literal keys.

# Privacy configuration
privacy:
  enabled: true
  mode: reversible  # reversible or irreversible
  redact_phone: true
  redact_id_card: true
  redact_bank_card: true
  redact_email: false
  redact_url: false
  blocked_words: []
  replacement: "[REDACTED]"

# LLM provider configuration
llm:
  provider: openai
  model: gpt-4o-mini                    # any model your endpoint serves
  base_url: https://api.openai.com/v1   # or any OpenAI-compatible endpoint
  api_key: ${OPENAI_API_KEY}            # set the env var; avoid literal keys

# Block builder configuration
block_builder:
  block_gap_minutes: 30  # Gap between messages to start a new block
  max_block_tokens: 4000  # Maximum tokens per block
  max_block_messages: 100  # Maximum messages per block

# Source configuration
sources:
  claude-code:
    enabled: true
  codex:
    enabled: true
  hermes:
    enabled: true
  feishu:
    enabled: true
    auth_mode: user
    app_id: <your-feishu-app-id>
    app_secret: ""  # unused in user auth mode
    sources:
      messages:
        enabled: true
        chat_ids: []
        lookback_days: 3
      dm:
        enabled: true
        dm_chat_ids: []
        lookback_days: 3
      message_search:
        enabled: true
        chat_types:
          - p2p
        lookback_days: 3
        page_size: 50

# Adapter configuration
adapters:
  file:
    enabled: false
    output_dir: ./output
  gbrain:
    enabled: false
    output_dir: ./gbrain-output

# Store (PGLite embedded PostgreSQL)
store:
  data_dir: ~/.memoark/data

# Embedding configuration
embedding:
  provider: ollama
  model: nomic-embed-text
  dimensions: 768
  # api_key: ${OPENAI_API_KEY}  # only needed when provider is openai

# Server configuration
server:
  http_port: 3927
