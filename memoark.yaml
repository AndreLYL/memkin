# Memoark Configuration

# Privacy configuration
privacy:
  enabled: true
  mode: reversible  # reversible or irreversible
  redact_phone: true
  redact_id_card: true
  redact_bank_card: true
  redact_email: false
  redact_url: false
  blocked_words: []
  replacement: "[REDACTED]"

# LLM provider configuration
llm:
  provider: openai
  model: claude-haiku-4.5
  base_url: https://api.tokenflying.top
  api_key: ${DBE_API_KEY}

# Block builder configuration
block_builder:
  block_gap_minutes: 30  # Gap between messages to start a new block
  max_block_tokens: 4000  # Maximum tokens per block
  max_block_messages: 100  # Maximum messages per block

# Source configuration
sources:
  claude-code:
    enabled: true
  codex:
    enabled: true
  hermes:
    enabled: true

# Adapter configuration
adapters:
  file:
    enabled: false
    output_dir: ./output
  gbrain:
    enabled: false
    output_dir: ./gbrain-output

# Store (PGLite embedded PostgreSQL)
store:
  data_dir: ~/.memoark/data

# Embedding configuration
embedding:
  provider: openai           # openai | ollama
  model: text-embedding-3-large
  dimensions: 1536
  # api_key: <your-api-key>  # Or set OPENAI_API_KEY env var

# Server configuration
server:
  http_port: 3927
