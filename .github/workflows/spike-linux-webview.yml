name: spike-linux-webview
on: workflow_dispatch
jobs:
  render-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Install WebKitGTK + xvfb + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev xvfb imagemagick x11-utils wmctrl openbox mesa-utils
      - name: Build probe
        run: cd spike/webview-probe && bun install && bun run build
      - name: Build Tauri spike app
        run: cd spike/src-tauri && cargo build --release
      - name: Launch headless + wait RENDER_DONE + screenshot
        run: |
          export DISPLAY=:99
          # Force software GL: avoid DRI3/EGL hardware-accel failure under Xvfb
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export LIBGL_ALWAYS_SOFTWARE=1
          export GALLIUM_DRIVER=llvmpipe
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          Xvfb :99 -screen 0 1280x900x24 & sleep 3
          # lightweight WM so windows get mapped/decorated and become capturable
          (command -v openbox >/dev/null && openbox &) || true
          sleep 1
          BIN=$(find spike/src-tauri/target/release -maxdepth 1 -type f -name 'memoark-spike*' ! -name '*.d' | head -1)
          echo "binary: $BIN"
          WEBKIT_FORCE_SANDBOX=0 "$BIN" & APP_PID=$!
          for i in $(seq 1 40); do
            T=$(wmctrl -l 2>/dev/null || true)
            echo "[$i] windows: $T"
            if echo "$T" | grep -qE 'RENDER_DONE|INLINE_DONE'; then echo "title-progressed"; break; fi
            sleep 1
          done
          sleep 2
          echo "=== wmctrl -l ==="; wmctrl -l || true
          echo "=== xwininfo -root -tree ==="; xwininfo -root -tree 2>/dev/null | head -40 || true
          # try to capture the app window specifically, fall back to root
          WID=$(wmctrl -l 2>/dev/null | grep -iE 'memoark|spike|RENDER_DONE|INLINE_DONE|probe' | head -1 | awk '{print $1}')
          echo "app window id: ${WID:-none}"
          if [ -n "$WID" ]; then
            import -window "$WID" spike/linux-graph.png || true
          fi
          # always also grab root as fallback / comparison
          import -window root spike/linux-graph-root.png || (xwd -root -silent | convert xwd:- spike/linux-graph-root.png)
          if [ ! -f spike/linux-graph.png ]; then cp spike/linux-graph-root.png spike/linux-graph.png; fi
          kill $APP_PID || true
      - uses: actions/upload-artifact@v4
        with: { name: linux-graph-screenshot, path: spike/linux-graph.png }
      - uses: actions/upload-artifact@v4
        with: { name: linux-graph-root, path: spike/linux-graph-root.png }
