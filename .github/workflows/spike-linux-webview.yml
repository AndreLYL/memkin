name: spike-linux-webview
on:
  push:
    branches: [feat/desktop-app]
  workflow_dispatch:
jobs:
  render-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Install WebKitGTK + xvfb + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev xvfb imagemagick x11-utils wmctrl
      - name: Build probe
        run: cd spike/webview-probe && bun install && bun run build
      - name: Build Tauri spike app
        run: cd spike/src-tauri && cargo build --release
      - name: Launch headless + wait RENDER_DONE + screenshot
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x900x24 & sleep 3
          BIN=$(find spike/src-tauri/target/release -maxdepth 1 -type f -name 'memoark-spike*' ! -name '*.d' | head -1)
          echo "binary: $BIN"
          "$BIN" & APP_PID=$!
          for i in $(seq 1 30); do
            if wmctrl -l 2>/dev/null | grep -q RENDER_DONE; then echo "render done"; break; fi
            sleep 1
          done
          sleep 2
          import -window root spike/linux-graph.png || (xwd -root -silent | convert xwd:- spike/linux-graph.png)
          kill $APP_PID || true
      - uses: actions/upload-artifact@v4
        with: { name: linux-graph-screenshot, path: spike/linux-graph.png }
