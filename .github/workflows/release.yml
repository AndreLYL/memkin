name: Release

# Cut a release by bumping "version" in package.json, then pushing a matching
# tag, e.g.:
#   git tag v0.3.0 && git push origin v0.3.0
#
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance

jobs:
  release:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} != package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: |
          timeout 300 bun run test || STATUS=$?
          if [ "${STATUS:-0}" -eq 124 ]; then
            echo "::warning::vitest hung after completion — forced exit"
            exit 0
          fi
          exit "${STATUS:-0}"

      - name: Build
        run: bun run build

      # The web UI is a separate Vite app with its own dependencies. Build it so
      # its static assets ship inside the npm package — `memkin serve` resolves
      # them from <package>/web/dist, so without this step npx users get no UI.
      - name: Build web UI
        run: |
          bun install --frozen-lockfile
          bun run build
        working-directory: web

      # Use Node's npm (with provenance support) for publishing, and prove the
      # built artifact actually runs on plain Node — this gate catches packaging
      # regressions (missing assets / unresolved imports) before they ship.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Smoke-test the PACKAGED artifact in a production-only install (no dev
      # dependencies), and run `--version` rather than `--help` so the CLI
      # entrypoint actually loads the agent collector. This catches a runtime
      # dependency wrongly declared under devDependencies (which a clean
      # `npx memkin` omits) — the exact class of bug that shipped in 0.4.1.
      - name: Smoke-test packaged CLI in a prod-only install
        run: |
          npm pack
          TGZ="$(ls memkin-*.tgz)"
          rm -rf /tmp/memkin-smoke && mkdir -p /tmp/memkin-smoke && cd /tmp/memkin-smoke
          npm init -y >/dev/null 2>&1
          npm install "${GITHUB_WORKSPACE}/${TGZ}" --omit=dev
          node node_modules/memkin/dist/cli.js --version
          test -f node_modules/memkin/web/dist/index.html \
            || { echo "::error::web/dist/index.html missing from the published package"; exit 1; }
          # Actually start `serve` under Node (not Bun) in the prod-only install and hit
          # it over HTTP. This catches Bun-only APIs on the served path (Bun.serve /
          # Bun.file), which crash `npx memkin serve|start` with "Bun is not defined" —
          # the bug that shipped in 0.4.x — plus any served-path dependency missing from
          # `dependencies`. `serve` refuses to run without a config, so write a minimal one.
          cat > memkin.yaml <<'YAML'
          store:
            engine: pglite
            data_dir: /tmp/memkin-smoke/data
          YAML
          node node_modules/memkin/dist/cli.js serve --config memkin.yaml \
            --host 127.0.0.1 --port 0 --no-open > serve.log 2>&1 &
          SERVE_PID=$!
          for i in $(seq 1 30); do
            grep -q MEMKIN_READY serve.log && break
            kill -0 "$SERVE_PID" 2>/dev/null || { echo "::error::serve exited early"; cat serve.log; exit 1; }
            sleep 1
          done
          URL="$(sed -n 's/.*MEMKIN_READY \(http[^ ]*\).*/\1/p' serve.log | head -1)"
          test -n "$URL" || { echo "::error::serve never printed MEMKIN_READY"; cat serve.log; exit 1; }
          curl -fsS "$URL/api/health" > /dev/null \
            || { echo "::error::/api/health failed under Node"; cat serve.log; kill "$SERVE_PID"; exit 1; }
          curl -fsS "$URL/" | grep -q "<title>Memkin</title>" \
            || { echo "::error::web UI not served under Node"; cat serve.log; kill "$SERVE_PID"; exit 1; }
          kill "$SERVE_PID" 2>/dev/null || true
          echo "serve smoke OK under Node: $URL"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            # Run without installing
            npx memkin@${{ github.ref_name }}

            # Or install globally
            npm install -g memkin@${{ github.ref_name }}
            ```

            Requires Node.js >= 18. See the README for setup and MCP integration.
